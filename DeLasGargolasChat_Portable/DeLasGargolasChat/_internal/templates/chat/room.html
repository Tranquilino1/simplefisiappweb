{% extends 'base.html' %}

{% block extra_css %}
<style>
    .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 140px);
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        overflow: hidden;
    }

    .chat-header {
        padding: 1rem 1.5rem;
        background: rgba(15, 23, 42, 0.9);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-messages {
        flex: 1;
        padding: 1.5rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .message {
        max-width: 70%;
        padding: 0.8rem 1.2rem;
        border-radius: 12px;
        position: relative;
        word-break: break-word;
    }

    .message-other {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.1);
        border-bottom-left-radius: 4px;
    }

    .message-self {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
        border-bottom-right-radius: 4px;
    }

    .message-sender {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
        display: block;
    }

    .message-self .message-sender {
        color: rgba(255, 255, 255, 0.7);
        display: none;
    }

    /* Don't show name for own msgs */

    .chat-input-area {
        padding: 1.2rem;
        background: rgba(15, 23, 42, 0.6);
        border-top: 1px solid var(--glass-border);
        display: flex;
        gap: 0.8rem;
        align-items: center;
    }

    #chat-message-input {
        flex: 1;
        margin: 0;
    }

    .tool-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .tool-btn:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar {
        width: 8px;
    }

    .chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="chat-container animate-fade-in">
    <div class="chat-header">
        <div>
            <h2 style="margin: 0; font-size: 1.2rem;">Sala: {{ room_name }}</h2>
            <span style="font-size: 0.8rem; color: #10b981;">● En vivo</span>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="tool-btn" title="Videollamada"
                onclick="alert('Funcionalidad WebRTC pendiente (Ver Anexo)')">📷</button>
            <button class="tool-btn" title="Llamada de voz"
                onclick="alert('Funcionalidad WebRTC pendiente (Ver Anexo)')">📞</button>
        </div>
    </div>

    <div class="chat-messages" id="chat-log">
        {% for msg in messages %}
        <div
            class="message {% if msg.sender.username == user.username %}message-self{% else %}message-other{% endif %}">
            <span class="message-sender">{{ msg.sender.username }}</span>
            <div>{{ msg.content }}</div>
        </div>
        {% endfor %}
    </div>

    <div class="chat-input-area">
        <button class="tool-btn" title="Adjuntar Archivo"
            onclick="alert('El envío de archivos vendrá en la siguiente actualización.')">📎</button>
        <button class="tool-btn" title="Grabar Nota de Voz"
            onclick="alert('Grabación de audio en desarrollo.')">🎤</button>
        <input type="text" id="chat-message-input" class="form-control" placeholder="Escribe un mensaje..." autofocus>
        <button id="chat-message-submit" class="btn-primary" style="width: auto;">Enviar 🚀</button>
    </div>
</div>

{{ room_name|json_script:"room-name" }}
{% endblock %}

{% block extra_js %}
<script>
    const roomName = JSON.parse(document.getElementById('room-name').textContent);
    const currentUser = "{{ user.username }}";

    const chatSocket = new WebSocket(
        'ws://'
        + window.location.host
        + '/ws/chat/'
        + roomName
        + '/'
    );

    const chatLog = document.querySelector('#chat-log');

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    scrollToBottom(); // Scroll on load

    chatSocket.onmessage = function (e) {
        const data = JSON.parse(e.data);
        const mdv = document.createElement('div');

        const isSelf = data.username === currentUser;
        mdv.className = isSelf ? 'message message-self' : 'message message-other';

        let contentHTML = '';
        if (!isSelf) {
            contentHTML += `<span class="message-sender">${data.username}</span>`;
        }
        contentHTML += `<div>${data.message}</div>`;

        mdv.innerHTML = contentHTML;
        chatLog.appendChild(mdv);
        scrollToBottom();
    };

    chatSocket.onclose = function (e) {
        console.error('Chat socket closed unexpectedly');
    };

    document.querySelector('#chat-message-input').focus();
    document.querySelector('#chat-message-input').onkeyup = function (e) {
        if (e.keyCode === 13) {  // enter, return
            document.querySelector('#chat-message-submit').click();
        }
    };

    document.querySelector('#chat-message-submit').onclick = function (e) {
        const messageInputDom = document.querySelector('#chat-message-input');
        const message = messageInputDom.value;
        if (message.trim() !== "") {
            chatSocket.send(JSON.stringify({
                'message': message
            }));
            messageInputDom.value = '';
        }
    };
</script>
{% endblock %}
