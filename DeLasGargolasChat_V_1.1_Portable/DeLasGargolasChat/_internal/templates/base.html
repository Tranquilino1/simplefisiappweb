{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeLasGargolasChat</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'chat:index' %}" class="navbar-brand">DeLasGargolasChat</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'users:profile' %}">Perfil</a>
                <a href="{% url 'chat:index' %}">Salas</a>
                <form action="{% url 'users:logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none;border:none;color:var(--text-main);font-weight:500;cursor:pointer;margin-left:1.5rem;font-family:inherit;font-size:1rem;">Cerrar Sesión</button>
                </form>
            {% else %}
                <a href="{% url 'users:login' %}">Iniciar Sesión</a>
                <a href="{% url 'users:register' %}">Registrarse</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
